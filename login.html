<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EduGenie</title>
    <meta name="description" content="Sign in to your EduGenie learning workspace. Access custom tutor Q&A, explainers, summaries, quizzes, and learning roadmaps.">
    <meta name="author" content="EduGenie">
    <meta property="og:title" content="Sign In - EduGenie Workspace">
    <meta property="og:description" content="Access your study desk.">
    <meta property="og:type" content="website">
    <link rel="stylesheet" href="/static/css/styles.css">
    <script>
        // Prevent layout white-flash when dark theme is active
        (function() {
            const storedTheme = localStorage.getItem('theme') || 'light';
            let activeTheme = storedTheme;
            if (storedTheme === 'auto') {
                activeTheme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.setAttribute('data-theme', activeTheme);
        })();
    </script>
    <script src="/static/js/main.js?v=1.0.1" defer></script>
</head>
<body>

    <!-- Header Navigation -->
    <header style="max-width: 1200px; margin: 0 auto; padding: 1.5rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color);">
        <a href="/" class="nav-brand" style="font-family: var(--font-heading); font-weight: 700; font-size: 1.3rem; color: var(--text-primary);">
            EduGenie
        </a>
        <a href="/register" class="btn-submit" style="padding: 0.5rem 1rem; border-radius: var(--radius-md);">Sign Up</a>
    </header>

    <!-- Content Container -->
    <div class="auth-wrapper">
        <div class="auth-header">
            <h2>Welcome Back</h2>
            <p style="color: var(--text-secondary); font-size: 0.95rem;">Access your learning desk</p>
        </div>

        <div class="auth-card">
            <!-- Error Banner -->
            <div id="authError" class="alert-error" style="display: none;"></div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="form-group">
                    <label for="username" class="form-label">Username</label>
                    <input type="text" id="username" name="username" class="workspace-input" required autocomplete="username">
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password" class="workspace-input" required autocomplete="current-password">
                </div>

                <button type="submit" class="btn-submit" style="width: 100%; justify-content: center; padding: 0.85rem;">Sign In</button>
            </form>

            <p style="margin-top: 1.5rem; text-align: center; font-size: 0.85rem; color: var(--text-secondary);">
                Don't have an account? <a href="/register" style="color: var(--color-primary); font-weight: 600;">Create an account</a>
            </p>
        </div>
    </div>

</body>
</html>
